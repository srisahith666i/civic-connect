
<!DOCTYPE html>
<html>
<head>
<title>Complaint</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

{% if request.args.get('success') %}
<script>
alert("Complaint registered successfully!");
</script>
{% endif %}

<h2>Raise Complaint</h2>

<form action="/submit-complaint" method="POST" enctype="multipart/form-data">

<select name="type" class="form-control mt-2">
<option>Garbage</option>
<option>Drainage</option>
<option>Road</option>
</select>

<input name="address" class="form-control mt-2" placeholder="Address" required>

<input name="date" type="date" class="form-control mt-2">

<input name="days" class="form-control mt-2" placeholder="Days facing issue">

<input name="image" type="file" class="form-control mt-2">

{% if error %}
<p style="color:red; text-align:center;">{{ error }}</p>
{% endif %}

<button type="button" class="btn btn-primary mt-3 w-100" onclick="confirmSubmit()">Submit</button>
</form>

<script>
function confirmSubmit() {
    let confirmAction = confirm("Do you want to submit this complaint?");

    if (confirmAction) {
        document.querySelector("form").submit();
    } else {
        alert("Complaint registration cancelled");
    }
}
</script>

</body>
</html>
