
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="text-center">Registration</h2>

<form action="/register-user" method="POST" class="mt-3">

<input name="name" class="form-control mt-2" placeholder="Name" required>

<input name="age" class="form-control mt-2" type="number" placeholder="Age" required>

<select name="gender" class="form-control mt-2">
    <option>Male</option>
    <option>Female</option>
</select>

<input name="phone"
       type="tel"
       pattern="[0-9]{10}"
       maxlength="10"
       placeholder="Enter 10 digit phone number"
       class="form-control mt-2"
       required>
<input name="email" class="form-control mt-2" type="email" placeholder="Email" required>

<input name="address" class="form-control mt-2" placeholder="Address">

<select name="house_type" class="form-control mt-2">
    <option>Apartment - Rent</option>
    <option>Apartment - Own</option>
    <option>Individual House - Rent</option>
    <option>Individual House - Own</option>
    <option>Duplex</option>
</select>

<input name="password" class="form-control mt-2" type="password" placeholder="Create Password" required>

<button class="btn btn-success mt-3 w-100">Register</button>

</form>

<script>
function sendOTP(){
    alert("OTP Sent (Demo)");
}
</script>

{% if request.args.get('success') %}
    <script>
        alert("User registered successfully!");
    </script>
{% endif %}

</body>
</html>
