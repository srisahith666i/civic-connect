
<!DOCTYPE html>
<html>
<head>
<title>Civic Connect</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    font-family: 'Poppins', sans-serif;
}

/* Main Container */
.container-box {
    max-width: 900px;
    margin: 40px auto;
    display: flex;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

/* LEFT SIDE */
.left {
    width: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    background: white;
    padding: 25px;
}

/* Login Cards */
.login-box {
    margin-bottom: 15px;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #eee;
    transition: 0.3s;
}

.login-box:hover {
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    color: white;
}

.resident-btn { background: #4facfe; }
.admin-btn { background: #ff6a6a; }

.signup {
    text-align: center;
    margin-top: 10px;
}

/* MOBILE FIX */
@media(max-width:768px){
    .container-box {
        flex-direction: column;
    }
    .left, .right {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container-box">

    <!-- LEFT -->
    <div class="left">
        <h1>🌆 Civic Connect</h1>
        <p>Smart complaint system for modern cities</p>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <!-- Resident -->
        <div class="login-box">

        <form action="/login" method="POST">

           <h5><i class="fa fa-user"></i> Login</h5>

           <select name="role" class="form-control mt-2">
               <option value="user">Resident</option>
               <option value="admin">Admin</option>
           </select>

           <input name="username" id="username"
       class="form-control mt-2"
       placeholder="Enter phone or username"
       required>
           <input name="password" type="password" class="form-control mt-2" placeholder="Password">

           {% if error %}
           <p style="color:red; text-align:center;">{{ error }}</p>
           {% endif %}

           <button class="btn btn-primary mt-3 w-100">Login</button>

        </form>

        </div>

        <!-- SIGN UP ALWAYS VISIBLE -->
        <div class="signup">
            Don't have account? <a href="/register">Sign Up</a>
        </div>

    </div>

</div>

<script>
function go(type){
    if(type === "resident"){
        window.location.href="/resident";
    } else {
        window.location.href="/admin";
    }
}
</script>

<script>
const roleSelect = document.querySelector('select[name="role"]');
const usernameInput = document.getElementById('username');

roleSelect.addEventListener('change', function () {
    if (this.value === "user") {
        usernameInput.placeholder = "Enter 10 digit phone number";
        usernameInput.pattern = "[0-9]{10}";
        usernameInput.maxLength = 10;
    } else {
        usernameInput.placeholder = "Enter admin username";
        usernameInput.removeAttribute("pattern");
        usernameInput.removeAttribute("maxlength");
    }
});
window.onload = function() {
    roleSelect.dispatchEvent(new Event('change'));
};
</script>

</body>
</html>
