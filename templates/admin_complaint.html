<!DOCTYPE html>
<html>
<head>
    <title>Complaint Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Complaint Details</h2>

<div class="card p-4 mt-3">

<p><b>Type:</b> {{ complaint[1] }}</p>
<p><b>Address:</b> {{ complaint[2] }}</p>
<p><b>Status:</b> {{ complaint[6] }}</p>

{% if complaint[7] %}
<img src="/uploads/{{ complaint[7] }}" width="300">
{% endif %}

</div>

<form action="/update/{{ complaint[0] }}" method="POST" class="mt-3">

<select name="status" class="form-control">
<option>Pending</option>
<option>In Progress</option>
<option>Resolved</option>
</select>

<select name="worker_id" class="form-control mt-2">

<option value="">Assign Worker</option>

{% for w in workers %}
<option value="{{ w[0] }}">{{ w[1] }} ({{ w[2] }})</option>
{% endfor %}

</select>

<p><b>Created At:</b> {{ complaint[9] }}</p>
<p><b>Resolved At:</b> {{ complaint[10] }}</p>

<button class="btn btn-success mt-2">Update Status</button>

</form>

<a href="/admin" class="btn btn-secondary mt-3">⬅ Back</a>

</body>
</html>
